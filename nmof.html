<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NMOF — 军团门户</title>

  <!-- Bootstrap 5.3 CSS — 切换版本只需替换下面两行 CDN 地址 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- 自定义样式：与 Bootstrap 版本解耦，使用 CSS 变量控制主题 -->
  <link href="custom.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- ======== Header ======== -->
  <header class="app-header">
    <div class="container">
      <div class="d-flex flex-wrap align-items-center justify-content-between py-3">
        <div class="app-brand">
          <img src="images/256x256.png" alt="NMOF" class="app-logo-img">
          <h1 class="app-title">NMOF</h1>
          <span class="app-subtitle">北冥有鱼军团门户</span>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <button class="btn btn-light btn-sm" id="btnExport" title="导出为 JSON 文件">
            <i class="bi bi-download me-1"></i>导出
          </button>
          <button class="btn btn-light btn-sm" id="btnImportTrigger" title="从 JSON 文件导入">
            <i class="bi bi-upload me-1"></i>导入
          </button>
          <input type="file" id="fileImport" accept=".json" class="d-none">
          <button class="btn btn-primary btn-sm" id="btnAdd" title="添加新链接">
            <i class="bi bi-plus-lg me-1"></i>添加入口
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ======== Search Bar ======== -->
  <section class="search-section">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="search-wrapper">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="搜索链接、描述、分类...">
            <span class="search-stats" id="searchStats"></span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ======== Link Cards Grid ======== -->
  <main class="flex-grow-1">
    <div class="container py-4">
      <div class="row g-4" id="cardsContainer">
        <!-- JS 动态渲染 -->
      </div>
      <div class="text-center py-5 d-none" id="emptyState">
        <div class="empty-emoji">📭</div>
        <p class="text-muted mt-3 fs-5">没有找到匹配的链接</p>
        <button class="btn btn-outline-secondary btn-sm" id="btnClearSearch">清除搜索</button>
      </div>
    </div>
  </main>

  <!-- ======== Pagination ======== -->
  <nav class="pagination-section pb-4 d-none" id="paginationNav">
    <div class="container">
      <div class="d-flex justify-content-center align-items-center gap-2">
        <ul class="pagination mb-0" id="paginationList">
        </ul>
        <select class="form-select form-select-sm" id="pageSizeSelect" style="width:auto;">
          <option value="8">8条/页</option>
          <option value="12" selected>12条/页</option>
          <option value="20">20条/页</option>
          <option value="100">全部</option>
        </select>
      </div>
    </div>
  </nav>

  <!-- ======== Footer ======== -->
  <footer class="app-footer mt-auto">
    <div class="container text-center py-3">
      <small class="footer-text">
        NMOF Navigation Manager · 数据文件 <code>links.json</code> · 总计 <span id="totalCount">0</span> 条入口
      </small>
    </div>
  </footer>

  <!-- ======== Add/Edit Modal ======== -->
  <div class="modal fade" id="linkModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title" id="modalTitle">添加链接</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="linkForm" novalidate>
            <input type="hidden" id="linkId">
            <div class="mb-3">
              <label class="form-label">Emoji 图标</label>
              <div class="emoji-picker d-flex align-items-center gap-2">
                <input type="text" class="form-control form-control-lg" id="linkEmoji"
                       placeholder="🔗" maxlength="4" style="width:80px;font-size:1.5rem;text-align:center;">
                <div class="emoji-suggestions d-flex gap-1 flex-wrap" id="emojiSuggestions"></div>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">名称 <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="linkTitle" placeholder="网站名称" required>
            </div>
            <div class="mb-3">
              <label class="form-label">链接地址 <span class="text-danger">*</span></label>
              <input type="url" class="form-control" id="linkUrl" placeholder="https://" required>
            </div>
            <div class="mb-3">
              <label class="form-label">分类</label>
              <input type="text" class="form-control" id="linkCategory" placeholder="如：开发、设计、工具"
                     list="categoryList" autocomplete="off">
              <datalist id="categoryList"></datalist>
            </div>
            <div class="mb-3">
              <label class="form-label">描述</label>
              <textarea class="form-control" id="linkDesc" rows="2" placeholder="简要说明..."></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-danger d-none" id="btnDelete">删除</button>
          <button type="button" class="btn btn-primary" id="btnSave">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ======== Delete Confirm Modal ======== -->
  <div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-body text-center py-4">
          <div class="fs-1 mb-2">⚠️</div>
          <p class="mb-0" id="confirmText">确定要删除这个链接吗？</p>
        </div>
        <div class="modal-footer border-0 pt-0 justify-content-center">
          <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-danger btn-sm" id="btnConfirmDelete">确认删除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ======== Toast Container ======== -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- 应用逻辑 -->
  <script src="app.js"></script>
</body>
</html>
