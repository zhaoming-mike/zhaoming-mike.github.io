<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亚服 TOP500 军团榜</title>
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #242424;
  --bg-hover: #2e2e2e;
  --border: #333;
  --text: #e0e0e0;
  --text2: #999;
  --text3: #666;
  --accent: #e09b32;
  --mono: 'SF Mono','Cascadia Code','Consolas',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;
}

.header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:10px 0;position:sticky;top:0;z-index:100;
}
.header-inner{
  max-width:1400px;margin:0 auto;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.header-left{display:flex;align-items:center;gap:16px}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1.15rem;color:var(--accent);white-space:nowrap}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sort-group{display:flex;align-items:center;gap:4px}
select,.search-input,.dropdown-trigger{
  height:34px;line-height:1.2;
  background:var(--bg3);color:var(--text);border:1px solid var(--border);
  border-radius:6px;padding:0 10px;font-size:.85rem;outline:none;transition:border-color .15s;
}
select{cursor:pointer}
select:focus,.search-input:focus,.dropdown-trigger:focus,.dropdown.open .dropdown-trigger{border-color:var(--accent)}
.reset-btn{
  height:34px;padding:0 10px;font-size:.8rem;cursor:pointer;
  background:var(--bg3);color:var(--text2);border:1px solid var(--border);
  border-radius:6px;outline:none;transition:border-color .15s,color .15s;
}
.reset-btn:hover{color:var(--text);border-color:var(--accent)}
.search-wrap{position:relative}
.search-input{padding:0 28px 0 34px;width:200px;cursor:text}
.search-input:focus{width:240px}
.search-input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-clear{
  position:absolute;right:4px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:1.1rem;line-height:1;padding:4px 6px;transition:color .15s;
}
.search-clear:hover{color:var(--text)}
.dropdown{position:relative;user-select:none}
.dropdown-trigger{
  cursor:pointer;display:flex;align-items:center;gap:6px;outline:none;
  position:relative;white-space:nowrap;padding-right:28px;
}
.dropdown-arrow{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:.65rem;color:var(--text3);pointer-events:none}
.dropdown-menu{
  display:none;position:absolute;top:100%;left:0;margin-top:4px;
  background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  min-width:100%;z-index:150;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
}
.dropdown.open .dropdown-menu{display:block}
.dropdown-option{
  display:flex;align-items:center;gap:6px;padding:6px 10px;cursor:pointer;
  font-size:.82rem;color:var(--text);transition:background .1s;white-space:nowrap;
}
.dropdown-option:hover{background:var(--bg-hover)}
.dropdown-option.active{color:var(--accent)}
.dropdown-option img,.dropdown-flag-placeholder{width:24px;height:18px;border-radius:1px;flex-shrink:0}
.dropdown-option img{object-fit:cover}
.dropdown-flag-placeholder{background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--text3)}
.dropdown-count{font-size:.72rem;color:var(--text3)}
.updated{font-size:.7rem;color:var(--text3);white-space:nowrap}
.main{max-width:1400px;margin:0 auto;padding:16px 20px 40px}


/* Card Grid */
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px 10px 12px;
  cursor:pointer;
  transition:transform .15s,box-shadow .15s,border-color .15s;
  display:flex;flex-direction:column;align-items:center;
  position:relative;
}
.card-rank-badge{
  position:absolute;top:5px;left:7px;
  font-family:var(--mono);font-size:.65rem;font-weight:600;
  color:var(--text3);
}
.card-rank-badge.top3{color:var(--accent)}
.card-delta{position:absolute;top:5px;right:7px;font-size:.6rem;font-weight:600}
.card-delta.up{color:#4caf84}
.card-delta.down{color:#e05555}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(0,0,0,.5);
  border-color:#555;
}
.card-emblem{width:48px;height:48px;border-radius:6px;display:block;margin-bottom:7px}
.card-emblem-placeholder{width:48px;height:48px;border-radius:6px;background:var(--border);margin-bottom:7px}
.card-tag{
  font-family:var(--mono);font-weight:700;font-size:.95rem;
  text-align:center;margin-bottom:2px;
}
.card-meta{display:flex;align-items:center;justify-content:center;gap:3px;margin-bottom:1px}
.card-flag{width:20px;height:15px;border-radius:1px;flex-shrink:0;object-fit:cover}
.card-country-name{font-size:.6rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:72px}
.card-meta-sep{font-size:.6rem;color:var(--text3)}
.card-members{font-size:.6rem;color:var(--text3)}
.card-name{
  font-size:.75rem;color:var(--text2);text-align:center;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;
}

/* Popover */
.popover{
  position:fixed;
  z-index:200;
  background:var(--bg2);
  border:1px solid #555;
  border-radius:8px;
  padding:12px 14px;
  width:220px;
  box-shadow:0 8px 28px rgba(0,0,0,.6);
  pointer-events:none;
  opacity:0;
  transform:translateX(6px);
  transition:opacity .15s,transform .15s;
}
.popover.show{opacity:1;transform:translateX(0)}
.popover-name{font-weight:600;font-size:.88rem;margin-bottom:2px;color:var(--text);word-break:break-word}
.popover-tag{font-family:var(--mono);font-weight:700;font-size:.85rem;margin-bottom:2px}
.popover-country{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.popover-flag{width:24px;height:18px;border-radius:2px;flex-shrink:0;object-fit:cover}
.popover-country-name{font-size:.75rem;color:var(--text2)}
.popover-members{font-size:.7rem;color:var(--text3);margin-bottom:4px}
.popover-info{display:flex;flex-direction:column;gap:2px;margin-bottom:4px}
.popover-info-row{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--text)}
.popover-info-label{color:var(--text3);flex-shrink:0}
.popover-motto{font-size:.7rem;color:var(--accent);font-style:italic;margin-bottom:2px}
.popover-desc{font-size:.7rem;color:var(--text2);margin-bottom:8px;line-height:1.4;max-height:60px;overflow:hidden;word-break:break-word}
.popover-dim-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:2px 0;font-size:.75rem;gap:16px;
}
.popover-dim-label{color:var(--text3)}
.popover-dim-value{font-family:var(--mono);color:var(--text);text-align:right}


.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;color:var(--text2)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state-msg{text-align:center;padding:60px 20px;color:var(--text3);font-size:.92rem}
.error-msg{text-align:center;padding:40px 20px;color:#d9534f;font-size:.88rem}

@media(max-width:768px){
  .header-inner{flex-direction:column;align-items:stretch}
  .header-left{flex-wrap:wrap;gap:8px}
  .controls{width:100%}
  .search-input{width:120px}.search-input:focus{width:140px}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
  .card{padding:10px 8px 8px}
  .card-emblem,.card-emblem-placeholder{width:40px;height:40px}
  .card-tag{font-size:.85rem}
  .card-name{font-size:.7rem}
}
@media(max-width:480px){
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="logo">坦克世界亚服 TOP500 军团榜</div>
    </div>
    <div class="controls">
      <span class="sort-group"><span>排序按</span><select id="sortSelect"></select></span>
      <div class="dropdown" id="countryDropdown">
        <button class="dropdown-trigger" id="countryTrigger">
          <span class="dropdown-label">全部国家</span>
          <span class="dropdown-arrow">▾</span>
        </button>
        <div class="dropdown-menu" id="countryMenu"></div>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10.5" cy="10.5" r="7"/><line x1="21" y1="21" x2="15.8" y2="15.8"/></svg>
        <input class="search-input" id="searchInput" type="text" placeholder="搜索军团名/标签…" autocomplete="off">
        <button class="search-clear" id="searchClear" style="display:none" title="清空">&times;</button>
      </div>
      <select id="ageFilter">
        <option value="">创建时间</option>
        <option value="1">不到一年</option>
        <option value="3">三年内</option>
        <option value="5">五年内</option>
        <option value="10">十年内</option>
        <option value="10+">十年以上</option>
      </select>
      <button id="resetBtn" class="reset-btn" title="重置筛选">重置</button>
      <span class="updated" id="updatedBadge"></span>
    </div>
  </div>
</header>

<main class="main">
  <div class="card-grid" id="cardGrid">
    <div class="loading"><div class="spinner"></div><span>加载数据中…</span></div>
  </div>

  <div class="state-msg" id="emptyState" style="display:none">没有找到匹配的军团，试试其他搜索词或切换排序维度。</div>
  <div class="error-msg" id="errorState" style="display:none"></div>

</main>

<div class="popover" id="popover"></div>

<script>
(function(){
'use strict';

const $ = (s,el) => (el||document).querySelector(s);
const URL_BASE = 'https://asia.wargaming.net/clans/wot/';

let rankField = 'efficiency';
let search = '';
let countryFilter = '';
let ageFilter = '';
let allClans = [];
let filtered = [];
let rankFields = [];
let clanMap = new Map();
let tagCountryMap = {};
let countryNames = {};
let visibleCount = 0;
const BATCH = 60;
let sentinelEl = null;
let observer = null;


async function init(){
  try{
    const [resp, mappingResp] = await Promise.all([
      fetch('data/clans-asia.json'),
      fetch('data/tag-country-mapping.json')
    ]);
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    allClans = json.clans || [];

    if(mappingResp.ok){
      try {
        const raw = await mappingResp.json();
        // raw = { "jp": {"name":"日本","tags":["JPTER",...]}, ... }
        for(const [cc, entry] of Object.entries(raw)){
          if(!entry || cc.startsWith('_')) continue;
          if(entry.name) countryNames[cc] = entry.name;
          if(typeof entry.tags === 'string'){
            entry.tags.split(',').map(t => t.trim()).filter(Boolean).forEach(t => { tagCountryMap[t] = cc; });
          } else if(Array.isArray(entry.tags)){
            entry.tags.forEach(t => { tagCountryMap[t] = cc; });
          }
        }
      } catch(e){}
      // build country filter dropdown — with flag images and clan count
      const ccSet = new Set(Object.values(tagCountryMap));
      const ccCount = {};
      let unmatchedCount = 0;
      for(const t of allClans.map(c => c.tag)){
        const cc = tagCountryMap[t];
        if(cc) { ccCount[cc] = (ccCount[cc] || 0) + 1; }
        else { unmatchedCount++; }
      }
      const countryOptions = [];
      for(const [cc, name] of Object.entries(countryNames)){
        if(!ccSet.has(cc)) continue;
        countryOptions.push({ cc, name, count: ccCount[cc] || 0 });
      }
      countryOptions.sort((a,b) => b.count - a.count);

      // count clans per age bracket
      const now = Date.now() / 1000;
      const spy = 365.25 * 24 * 60 * 60;
      const ageCounts = { '1':0, '3':0, '5':0, '10':0, '10+':0 };
      for(const c of allClans){
        if(!c.created_at) continue;
        const age = (now - c.created_at) / spy;
        if(age < 1) ageCounts['1']++;
        else if(age < 3) ageCounts['3']++;
        else if(age < 5) ageCounts['5']++;
        else if(age < 10) ageCounts['10']++;
        else ageCounts['10+']++;
      }
      const as = $('#ageFilter');
      as.innerHTML = '<option value="">创建时间</option>' +
        ['1','3','5','10','10+'].map(v => {
          const label = { '1':'不到一年', '3':'一至三年', '5':'三至五年', '10':'五至十年', '10+':'十年以上' }[v];
          return `<option value="${v}">${label} (${ageCounts[v]})</option>`;
        }).join('');

      const menu = $('#countryMenu');
      menu.innerHTML =
        `<div class="dropdown-option" data-value="">全部国家</div>` +
        countryOptions.map(o =>
          `<div class="dropdown-option" data-value="${o.cc}">
            ${flagImg(o.cc, 24, 18)}
            <span>${esc(o.name)}</span>
            <span class="dropdown-count">(${o.count})</span>
          </div>`).join('') +
        `<div class="dropdown-option" data-value="_unmatched">
          <span class="dropdown-flag-placeholder">?</span>
          <span>待确认</span>
          <span class="dropdown-count">(${unmatchedCount})</span>
        </div>`;

      // dropdown behavior
      const dropdown = $('#countryDropdown');
      const trigger = $('#countryTrigger');
      const label = trigger.querySelector('.dropdown-label');

      menu.querySelectorAll('.dropdown-option').forEach(opt => {
        opt.addEventListener('click', () => {
          const val = opt.dataset.value;
          countryFilter = val;
          // update label
          if(val === ''){
            label.innerHTML = '全部国家';
          } else if(val === '_unmatched'){
            label.innerHTML = `<span class="dropdown-flag-placeholder" style="display:inline-flex;width:24px;height:18px;vertical-align:middle">?</span> 待确认 <span class="dropdown-count">(${unmatchedCount})</span>`;
          } else {
            const name = countryNames[val] || val;
            const n = ccCount[val] || 0;
            label.innerHTML = `${flagImg(val,24,18)} ${esc(name)} <span class="dropdown-count">(${n})</span>`;
          }
          // mark active
          menu.querySelectorAll('.dropdown-option').forEach(o => o.classList.remove('active'));
          opt.classList.add('active');
          dropdown.classList.remove('open');
          apply();
        });
      });

      trigger.addEventListener('click', e => { e.stopPropagation(); dropdown.classList.toggle('open'); });
      document.addEventListener('click', e => { if(!dropdown.contains(e.target)) dropdown.classList.remove('open'); });
    }
    rankFields = json.rank_fields || [];
    clanMap = new Map(allClans.map(c => [c.clan_id, c]));

    $('#updatedBadge').textContent = json.generated_at
      ? '数据更新于 ' + new Date(json.generated_at).toLocaleString('zh-CN')
      : '';

    $('#sortSelect').innerHTML = rankFields.map(f =>
      `<option value="${f.id}"${f.id===rankField?' selected':''}>${f.label}</option>`
    ).join('');

    $('#errorState').style.display = 'none';
    apply();
  }catch(err){
    console.error(err);
    $('#errorState').innerHTML = '数据加载失败。请先运行 <code>node J01-fetch-clans.js</code> 生成数据，再用本地服务器打开（如 <code>npx serve .</code>）。';
    $('#errorState').style.display = '';
    $('#cardGrid').innerHTML = '';
    $('#pagination').innerHTML = '';
  }
}

function apply(){
  let list = allClans;

  const q = search.trim().toLowerCase();
  if(q){
    list = list.filter(c => {
      const n = (c.name||'').toLowerCase();
      const t = (c.tag||'').toLowerCase();
      return n.includes(q) || t.includes(q);
    });
  }

  if(countryFilter){
    if(countryFilter === '_unmatched'){
      list = list.filter(c => !tagCountryMap[c.tag]);
    } else {
      list = list.filter(c => tagCountryMap[c.tag] === countryFilter);
    }
  }

  if(ageFilter){
    const now = Date.now() / 1000;
    const spy = 365.25 * 24 * 60 * 60;
    const thresholds = { '1':[0,1], '3':[1,3], '5':[3,5], '10':[5,10], '10+':[10,Infinity] };
    const [lo, hi] = thresholds[ageFilter];
    list = list.filter(c => c.created_at && (now - c.created_at) / spy >= lo && (now - c.created_at) / spy < hi);
  }

  filtered = list;

  filtered.sort((a,b) => {
    const ra = a.rankings?.[rankField]?.rank ?? Infinity;
    const rb = b.rankings?.[rankField]?.rank ?? Infinity;
    return ra - rb;
  });

  render();
}

function esc(s){
  const d = document.createElement('div');
  d.textContent = s ?? '';
  return d.innerHTML;
}

function flagImg(cc, w, h, cls){
  const c = cls ? ` class="${cls}"` : '';
  if(cc === 'xx') return `<span${c} style="display:inline-block;width:${w}px;height:${h}px;background:linear-gradient(135deg,#555 25%,#888 25%,#888 50%,#555 50%,#555 75%,#888 75%);border-radius:1px;flex-shrink:0;vertical-align:middle"></span>`;
  return `<img${c} src="https://flagcdn.com/${w}x${h}/${cc}.png" alt="${cc}" width="${w}" height="${h}">`;
}

function fmtVal(v, fieldId){
  if(v==null) return '—';
  if(fieldId==='wins_ratio_avg') return Math.round(v) + '%';
  return Math.round(v).toLocaleString('zh-CN');
}

// ── Popover ──
function showPopover(card, clan){
  const rect = card.getBoundingClientRect();
  const popover = $('#popover');

  const rows = rankFields.map(rf => {
    const v = clan.rankings?.[rf.id]?.value;
    return `<div class="popover-dim-row">
      <span class="popover-dim-label">${rf.label}</span>
      <span class="popover-dim-value">${fmtVal(v, rf.id)}</span>
    </div>`;
  }).join('');

  const cc = tagCountryMap[clan.tag] || '';
  const countryName = countryNames[cc] || '';
  const countryHTML = cc ? `<div class="popover-country">
    ${flagImg(cc, 24, 18, 'popover-flag')}
    <span class="popover-country-name">${esc(countryName)}</span>
  </div>` : '';

  popover.innerHTML = `
    <div class="popover-name">${esc(clan.name)}</div>
    <div class="popover-tag"${clan.color ? ` style="color:${esc(clan.color)}"` : ''}>${clan.tag ? esc(clan.tag) : '—'}</div>
    ${countryHTML}
    <div class="popover-members">${clan.members_count != null ? '👥 ' + clan.members_count + ' 名成员' : ''}</div>
    <div class="popover-info">
      ${clan.leader_name ? `<div class="popover-info-row"><span class="popover-info-label">团长</span><span>${esc(clan.leader_name)}</span></div>` : ''}
      ${clan.creator_name && clan.creator_name !== clan.leader_name ? `<div class="popover-info-row"><span class="popover-info-label">创建人</span><span>${esc(clan.creator_name)}</span></div>` : ''}
      ${clan.created_at ? `<div class="popover-info-row"><span class="popover-info-label">创建于</span><span>${new Date(clan.created_at * 1000).toLocaleDateString('zh-CN')}</span></div>` : ''}
    </div>
    ${clan.motto ? `<div class="popover-motto">"${esc(clan.motto)}"</div>` : ''}
    ${clan.description ? `<div class="popover-desc">${esc(clan.description)}</div>` : ''}
    ${rows}
  `;

  popover.classList.add('show');

  requestAnimationFrame(() => {
    const pw = popover.offsetWidth;
    const ph = popover.offsetHeight;
    let left = rect.right + 8;
    let top = rect.top;

    if(left + pw > window.innerWidth - 8) left = rect.left - pw - 8;
    if(left < 8) left = 8;
    if(top + ph > window.innerHeight - 8) top = window.innerHeight - ph - 8;
    if(top < 8) top = 8;

    popover.style.left = left + 'px';
    popover.style.top = top + 'px';
  });
}

function hidePopover(){
  $('#popover').classList.remove('show');
}

// ── Render ──
function cardHTML(c){
  const d = c.rankings?.[rankField];
  const r = d?.rank ?? null;
  const delta = d?.rank_delta;
  const deltaHTML = delta ? `<span class="card-delta${delta < 0 ? ' up' : ' down'}">${delta < 0 ? '▲' : '▼'}${Math.abs(delta)}</span>` : '';
  const cc = tagCountryMap[c.tag] || '';
  const countryName = countryNames[cc] || '';
  const membersHTML = c.members_count != null ? `👥 ${c.members_count}` : '';
  const infoHTML = cc
    ? `<div class="card-meta">
        ${flagImg(cc, 20, 15, 'card-flag')}
        <span class="card-country-name">${esc(countryName)}</span>
        <span class="card-meta-sep">·</span>
        <span class="card-members">${membersHTML}</span>
      </div>`
    : (membersHTML ? `<div class="card-meta"><span class="card-members">${membersHTML}</span></div>` : '');
  return `<div class="card" data-clan-id="${c.clan_id}">
    <span class="card-rank-badge${r && r <= 3 ? ' top3' : ''}">${r ? '#'+r : '—'}</span>
    ${c.emblem
      ? `<img class="card-emblem" src="${esc(c.emblem)}" alt="" loading="lazy">`
      : '<div class="card-emblem-placeholder"></div>'}
    <div class="card-tag"${c.color ? ` style="color:${esc(c.color)}"` : ''}>${c.tag ? esc(c.tag) : '—'}</div>
    ${infoHTML}
    <div class="card-name">${esc(c.name)}</div>
    ${deltaHTML}
  </div>`;
}

function attachCards(container){
  container.querySelectorAll('.card').forEach(card => {
    card.addEventListener('mouseenter', () => {
      const clan = clanMap.get(+card.dataset.clanId);
      if(clan) showPopover(card, clan);
    });
    card.addEventListener('mouseleave', hidePopover);
  });
}

function renderCards(){
  const grid = $('#cardGrid');
  grid.innerHTML = '';
  visibleCount = Math.min(BATCH, filtered.length);

  if(!filtered.length){
    grid.innerHTML = '<div class="state-msg" style="grid-column:1/-1">没有匹配的军团</div>';
    return;
  }

  grid.innerHTML = filtered.slice(0, visibleCount).map(cardHTML).join('');
  attachCards(grid);

  if(visibleCount < filtered.length){
    sentinelEl = document.createElement('div');
    sentinelEl.id = 'sentinel';
    sentinelEl.style.cssText = 'grid-column:1/-1;height:1px';
    grid.appendChild(sentinelEl);
    observeSentinel();
  }
}

function loadMore(){
  const prev = visibleCount;
  visibleCount = Math.min(visibleCount + BATCH, filtered.length);
  const sentinel = $('#sentinel');
  sentinel.insertAdjacentHTML('beforebegin', filtered.slice(prev, visibleCount).map(cardHTML).join(''));
  attachCards($('#cardGrid'));
  if(visibleCount >= filtered.length){
    sentinel.remove();
    sentinelEl = null;
    if(observer) observer.disconnect();
  }
}

function observeSentinel(){
  if(observer) observer.disconnect();
  observer = new IntersectionObserver(entries => {
    if(entries[0].isIntersecting){
      loadMore();
    }
  }, { rootMargin: '200px' });
  observer.observe(sentinelEl);
}

function render(){
  renderCards();
  $('#emptyState').style.display = filtered.length===0 ? '' : 'none';
}

// ── Events ──
$('#searchInput').addEventListener('input', function(){
  search = this.value;
  $('#searchClear').style.display = search ? '' : 'none';
  apply();
});

$('#searchClear').addEventListener('click', function(){
  const input = $('#searchInput');
  input.value = '';
  search = '';
  this.style.display = 'none';
  apply();
  input.focus();
});

$('#ageFilter').addEventListener('change', function(){
  ageFilter = this.value;
  apply();
});

$('#resetBtn').addEventListener('click', function(){
  search = '';
  countryFilter = '';
  ageFilter = '';
  rankField = 'efficiency';
  const input = $('#searchInput');
  input.value = '';
  $('#searchClear').style.display = 'none';
  $('#countryDropdown').querySelector('.dropdown-label').innerHTML = '全部国家';
  $('#countryDropdown').querySelectorAll('.dropdown-option').forEach(o => o.classList.remove('active'));
  $('#sortSelect').value = 'efficiency';
  $('#ageFilter').value = '';
  apply();
});

$('#sortSelect').addEventListener('change', function(){
  rankField = this.value;
  apply();
});

document.addEventListener('click', function(e){
  if(e.target.closest('[data-stop]')) return;
  const card = e.target.closest('.card');
  if(card) window.open(URL_BASE + card.dataset.clanId + '/', '_blank');
});

init();
})();
</script>

</body>
</html>
