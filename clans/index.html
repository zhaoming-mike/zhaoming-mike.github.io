<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亚服TOP500 军团榜</title>
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #242424;
  --bg-hover: #2e2e2e;
  --border: #333;
  --text: #e0e0e0;
  --text2: #999;
  --text3: #666;
  --accent: #e09b32;
  --mono: 'SF Mono','Cascadia Code','Consolas',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;
}

.header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:10px 0;position:sticky;top:0;z-index:100;
}
.header-inner{
  max-width:1400px;margin:0 auto;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.header-left{display:flex;align-items:center;gap:16px}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1.15rem;color:var(--accent);white-space:nowrap}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
select,.search-input{
  background:var(--bg3);color:var(--text);border:1px solid var(--border);
  border-radius:6px;padding:6px 10px;font-size:.85rem;outline:none;transition:border-color .15s;
}
select{cursor:pointer}
select:focus,.search-input:focus{border-color:var(--accent)}
.search-wrap{position:relative}
.search-input{padding:7px 28px 7px 34px;width:200px;cursor:text}
.search-input:focus{width:240px}
.search-input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-clear{
  position:absolute;right:4px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:1.1rem;line-height:1;padding:4px 6px;transition:color .15s;
}
.search-clear:hover{color:var(--text)}
.updated{font-size:.7rem;color:var(--text3);white-space:nowrap}
.main{max-width:1400px;margin:0 auto;padding:16px 20px 40px}


/* Card Grid */
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px 10px 12px;
  cursor:pointer;
  transition:transform .15s,box-shadow .15s,border-color .15s;
  display:flex;flex-direction:column;align-items:center;
  position:relative;
}
.card-rank-badge{
  position:absolute;top:5px;left:7px;
  font-family:var(--mono);font-size:.65rem;font-weight:600;
  color:var(--text3);
}
.card-rank-badge.top3{color:var(--accent)}
.card-delta{position:absolute;top:5px;right:7px;font-size:.6rem;font-weight:600}
.card-delta.up{color:#4caf84}
.card-delta.down{color:#e05555}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(0,0,0,.5);
  border-color:#555;
}
.card-emblem{width:48px;height:48px;border-radius:6px;display:block;margin-bottom:7px}
.card-emblem-placeholder{width:48px;height:48px;border-radius:6px;background:var(--border);margin-bottom:7px}
.card-tag{
  font-family:var(--mono);font-weight:700;font-size:.95rem;
  text-align:center;margin-bottom:2px;
}
.card-members{font-size:.65rem;color:var(--text3);margin-bottom:1px}
.card-name{
  font-size:.75rem;color:var(--text2);text-align:center;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;
}

/* Popover */
.popover{
  position:fixed;
  z-index:200;
  background:var(--bg2);
  border:1px solid #555;
  border-radius:8px;
  padding:12px 14px;
  width:220px;
  box-shadow:0 8px 28px rgba(0,0,0,.6);
  pointer-events:none;
  opacity:0;
  transform:translateX(6px);
  transition:opacity .15s,transform .15s;
}
.popover.show{opacity:1;transform:translateX(0)}
.popover-name{font-weight:600;font-size:.88rem;margin-bottom:2px;color:var(--text);word-break:break-word}
.popover-tag{font-family:var(--mono);font-weight:700;font-size:.85rem;margin-bottom:2px}
.popover-members{font-size:.7rem;color:var(--text3);margin-bottom:4px}
.popover-motto{font-size:.7rem;color:var(--accent);font-style:italic;margin-bottom:2px}
.popover-desc{font-size:.7rem;color:var(--text2);margin-bottom:8px;line-height:1.4;max-height:60px;overflow:hidden;word-break:break-word}
.popover-dim-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:2px 0;font-size:.75rem;gap:16px;
}
.popover-dim-label{color:var(--text3)}
.popover-dim-value{font-family:var(--mono);color:var(--text);text-align:right}


.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;color:var(--text2)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state-msg{text-align:center;padding:60px 20px;color:var(--text3);font-size:.92rem}
.error-msg{text-align:center;padding:40px 20px;color:#d9534f;font-size:.88rem}

@media(max-width:768px){
  .header-inner{flex-direction:column;align-items:stretch}
  .header-left{flex-wrap:wrap;gap:8px}
  .controls{justify-content:space-between;width:100%}
  .search-input{width:140px}.search-input:focus{width:160px}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
  .card{padding:10px 8px 8px}
  .card-emblem,.card-emblem-placeholder{width:40px;height:40px}
  .card-tag{font-size:.85rem}
  .card-name{font-size:.7rem}
}
@media(max-width:480px){
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="logo">坦克世界亚服 TOP500 军团榜</div>
    </div>
    <div class="controls">
      <span>排序按</span>
      <select id="sortSelect"></select>
      <div class="search-wrap">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10.5" cy="10.5" r="7"/><line x1="21" y1="21" x2="15.8" y2="15.8"/></svg>
        <input class="search-input" id="searchInput" type="text" placeholder="搜索军团名/标签…" autocomplete="off">
        <button class="search-clear" id="searchClear" style="display:none" title="清空">&times;</button>
      </div>
      <span class="updated" id="updatedBadge"></span>
    </div>
  </div>
</header>

<main class="main">
  <div class="card-grid" id="cardGrid">
    <div class="loading"><div class="spinner"></div><span>加载数据中…</span></div>
  </div>

  <div class="state-msg" id="emptyState" style="display:none">没有找到匹配的军团，试试其他搜索词或切换排序维度。</div>
  <div class="error-msg" id="errorState" style="display:none"></div>

</main>

<div class="popover" id="popover"></div>

<script>
(function(){
'use strict';

const $ = (s,el) => (el||document).querySelector(s);
const URL_BASE = 'https://asia.wargaming.net/clans/wot/';

let rankField = 'efficiency';
let search = '';
let allClans = [];
let filtered = [];
let rankFields = [];
let clanMap = new Map();
let visibleCount = 0;
const BATCH = 60;
let sentinelEl = null;
let observer = null;


async function init(){
  try{
    const resp = await fetch('data/clans-asia.json');
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    allClans = json.clans || [];
    rankFields = json.rank_fields || [];
    clanMap = new Map(allClans.map(c => [c.clan_id, c]));

    $('#updatedBadge').textContent = json.generated_at
      ? '数据更新于 ' + new Date(json.generated_at).toLocaleString('zh-CN')
      : '';

    $('#sortSelect').innerHTML = rankFields.map(f =>
      `<option value="${f.id}"${f.id===rankField?' selected':''}>${f.label}</option>`
    ).join('');

    $('#errorState').style.display = 'none';
    apply();
  }catch(err){
    console.error(err);
    $('#errorState').innerHTML = '数据加载失败。请先运行 <code>node J01-fetch-clans.js</code> 生成数据，再用本地服务器打开（如 <code>npx serve .</code>）。';
    $('#errorState').style.display = '';
    $('#cardGrid').innerHTML = '';
    $('#pagination').innerHTML = '';
  }
}

function apply(){
  const q = search.trim().toLowerCase();
  if(q){
    filtered = allClans.filter(c => {
      const n = (c.name||'').toLowerCase();
      const t = (c.tag||'').toLowerCase();
      return n.includes(q) || t.includes(q);
    });
  }else{
    filtered = allClans.slice();
  }

  filtered.sort((a,b) => {
    const ra = a.rankings?.[rankField]?.rank ?? Infinity;
    const rb = b.rankings?.[rankField]?.rank ?? Infinity;
    return ra - rb;
  });

  render();
}

function esc(s){
  const d = document.createElement('div');
  d.textContent = s ?? '';
  return d.innerHTML;
}

function fmtVal(v, fieldId){
  if(v==null) return '—';
  if(fieldId==='wins_ratio_avg') return Math.round(v) + '%';
  return Math.round(v).toLocaleString('zh-CN');
}

// ── Popover ──
function showPopover(card, clan){
  const rect = card.getBoundingClientRect();
  const popover = $('#popover');

  const rows = rankFields.map(rf => {
    const v = clan.rankings?.[rf.id]?.value;
    return `<div class="popover-dim-row">
      <span class="popover-dim-label">${rf.label}</span>
      <span class="popover-dim-value">${fmtVal(v, rf.id)}</span>
    </div>`;
  }).join('');

  popover.innerHTML = `
    <div class="popover-name">${esc(clan.name)}</div>
    <div class="popover-tag"${clan.color ? ` style="color:${esc(clan.color)}"` : ''}>${clan.tag ? esc(clan.tag) : '—'}</div>
    <div class="popover-members">${clan.members_count != null ? clan.members_count + ' 名成员' : ''}</div>
    ${clan.motto ? `<div class="popover-motto">"${esc(clan.motto)}"</div>` : ''}
    ${clan.description ? `<div class="popover-desc">${esc(clan.description)}</div>` : ''}
    ${rows}
  `;

  popover.classList.add('show');

  requestAnimationFrame(() => {
    const pw = popover.offsetWidth;
    const ph = popover.offsetHeight;
    let left = rect.right + 8;
    let top = rect.top;

    if(left + pw > window.innerWidth - 8) left = rect.left - pw - 8;
    if(left < 8) left = 8;
    if(top + ph > window.innerHeight - 8) top = window.innerHeight - ph - 8;
    if(top < 8) top = 8;

    popover.style.left = left + 'px';
    popover.style.top = top + 'px';
  });
}

function hidePopover(){
  $('#popover').classList.remove('show');
}

// ── Render ──
function cardHTML(c){
  const d = c.rankings?.[rankField];
  const r = d?.rank ?? null;
  const delta = d?.rank_delta;
  const deltaHTML = delta ? `<span class="card-delta${delta < 0 ? ' up' : ' down'}">${delta < 0 ? '▲' : '▼'}${Math.abs(delta)}</span>` : '';
  return `<div class="card" data-clan-id="${c.clan_id}">
    <span class="card-rank-badge${r && r <= 3 ? ' top3' : ''}">${r ? '#'+r : '—'}</span>
    ${c.emblem
      ? `<img class="card-emblem" src="${esc(c.emblem)}" alt="" loading="lazy">`
      : '<div class="card-emblem-placeholder"></div>'}
    <div class="card-tag"${c.color ? ` style="color:${esc(c.color)}"` : ''}>${c.tag ? esc(c.tag) : '—'}</div>
    <div class="card-members">${c.members_count != null ? '👥'+c.members_count : ''}</div>
    <div class="card-name">${esc(c.name)}</div>
    ${deltaHTML}
  </div>`;
}

function attachCards(container){
  container.querySelectorAll('.card').forEach(card => {
    card.addEventListener('mouseenter', () => {
      const clan = clanMap.get(+card.dataset.clanId);
      if(clan) showPopover(card, clan);
    });
    card.addEventListener('mouseleave', hidePopover);
  });
}

function renderCards(){
  const grid = $('#cardGrid');
  grid.innerHTML = '';
  visibleCount = Math.min(BATCH, filtered.length);

  if(!filtered.length){
    grid.innerHTML = '<div class="state-msg" style="grid-column:1/-1">没有匹配的军团</div>';
    return;
  }

  grid.innerHTML = filtered.slice(0, visibleCount).map(cardHTML).join('');
  attachCards(grid);

  if(visibleCount < filtered.length){
    sentinelEl = document.createElement('div');
    sentinelEl.id = 'sentinel';
    sentinelEl.style.cssText = 'grid-column:1/-1;height:1px';
    grid.appendChild(sentinelEl);
    observeSentinel();
  }
}

function loadMore(){
  const prev = visibleCount;
  visibleCount = Math.min(visibleCount + BATCH, filtered.length);
  const sentinel = $('#sentinel');
  sentinel.insertAdjacentHTML('beforebegin', filtered.slice(prev, visibleCount).map(cardHTML).join(''));
  attachCards($('#cardGrid'));
  if(visibleCount >= filtered.length){
    sentinel.remove();
    sentinelEl = null;
    if(observer) observer.disconnect();
  }
}

function observeSentinel(){
  if(observer) observer.disconnect();
  observer = new IntersectionObserver(entries => {
    if(entries[0].isIntersecting){
      loadMore();
    }
  }, { rootMargin: '200px' });
  observer.observe(sentinelEl);
}

function render(){
  renderCards();
  $('#emptyState').style.display = filtered.length===0 ? '' : 'none';
}

// ── Events ──
$('#searchInput').addEventListener('input', function(){
  search = this.value;
  $('#searchClear').style.display = search ? '' : 'none';
  apply();
});

$('#searchClear').addEventListener('click', function(){
  const input = $('#searchInput');
  input.value = '';
  search = '';
  this.style.display = 'none';
  apply();
  input.focus();
});

$('#sortSelect').addEventListener('change', function(){
  rankField = this.value;
  apply();
});

document.addEventListener('click', function(e){
  if(e.target.closest('[data-stop]')) return;
  const card = e.target.closest('.card');
  if(card) window.open(URL_BASE + card.dataset.clanId + '/', '_blank');
});

init();
})();
</script>

</body>
</html>
