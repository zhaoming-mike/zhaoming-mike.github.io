<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北冥有鱼军团数据后台</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1d23; --surface: #252830; --border: #3a3d44; --text: #d0d3d8;
  --text-secondary: #91959e; --accent: #e0993c; --accent-hover: #f0b44a;
  --danger: #d94a4a; --danger-hover: #e85c5c; --green: #4caf50;
  --header-bg: #1e2128; --row-hover: #2a2d35; --badge-bg: #30333b;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 1600px; margin: 0 auto; padding: 16px; }

/* Header */
.header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 16px 20px; background: var(--header-bg); border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 1.4rem; font-weight: 700; white-space: nowrap; }
.header h1 span { color: var(--accent); }
.header .actions { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
.btn { padding: 7px 16px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 0.875rem; font-weight: 500; background: var(--surface); color: var(--text); transition: all 0.15s; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { background: var(--row-hover); border-color: var(--text-secondary); }
.btn-primary { background: var(--accent); color: #1a1d23; border-color: var(--accent); font-weight: 600; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-sm { padding: 4px 10px; font-size: 0.75rem; }
.tank-count { font-size: 0.875rem; color: var(--text-secondary); margin-left: 8px; }

/* Toolbar */
.toolbar { display: flex; gap: 10px; padding: 12px 0; flex-wrap: wrap; align-items: center; }
.search-box { flex: 1; min-width: 200px; position: relative; }
.search-box input { width: 100%; padding: 8px 12px 8px 36px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font-size: 0.875rem; outline: none; }
.search-box input:focus { border-color: var(--accent); }
.search-box .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 0.875rem; }
select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font-size: 0.875rem; outline: none; cursor: pointer; min-width: 100px; }
select:focus { border-color: var(--accent); }
.filter-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.filter-group label { font-size: 0.8rem; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.range-input { width: 70px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text); font-size: 0.8rem; outline: none; }
.range-input:focus { border-color: var(--accent); }
.toggle-filters { cursor: pointer; color: var(--accent); font-size: 0.875rem; user-select: none; }

/* Table */
.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); }
table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
thead { position: sticky; top: 0; z-index: 2; }
th { background: var(--header-bg); padding: 10px 12px; text-align: left; font-weight: 600; white-space: nowrap; cursor: pointer; user-select: none; border-bottom: 2px solid var(--border); color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
th:hover { color: var(--text); }
th .sort-arrow { margin-left: 4px; font-size: 0.7rem; opacity: 0.5; }
th .sort-arrow.active { opacity: 1; color: var(--accent); }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
tr:hover td { background: var(--row-hover); }
tr { cursor: pointer; transition: background 0.1s; }
.thumb-img { width: 60px; height: 34px; object-fit: contain; background: var(--bg); border-radius: 3px; display: block; }
.thumb-img-fallback { width: 60px; height: 34px; display: flex; align-items: center; justify-content: center; background: var(--bg); border-radius: 3px; color: var(--text-secondary); font-size: 0.65rem; }
.tank-name { font-weight: 600; color: #fff; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; background: var(--badge-bg); }
.badge-tier { color: var(--accent); }
.badge-premium { background: #4a3820; color: #f0b44a; }
.badge-type-重坦 { background: #3d2828; color: #e07070; }
.badge-type-中坦 { background: #283528; color: #8bc34a; }
.badge-type-轻坦 { background: #28353d; color: #64b5f6; }
.badge-type-坦歼 { background: #353028; color: #ffb74d; }
.badge-type-火炮 { background: #3d2835; color: #ce93d8; }
.nation-flag { font-size: 1.1rem; }

/* Pagination */
.pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; gap: 12px; flex-wrap: wrap; }
.pagination .page-btns { display: flex; gap: 4px; }
.pagination .page-btns button { min-width: 36px; padding: 6px 10px; }
.page-size select { min-width: auto; padding: 6px 8px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 1; }
.modal-header h2 { font-size: 1.2rem; }
.modal-close { background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
.modal-close:hover { color: var(--text); background: var(--row-hover); }
.modal-body { padding: 24px; }
.modal-image { width: 100%; max-width: 500px; margin: 0 auto 20px; display: block; object-fit: contain; background: var(--bg); border-radius: 8px; min-height: 200px; }
.detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.detail-item { background: var(--bg); padding: 12px 16px; border-radius: 8px; }
.detail-item label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 4px; }
.detail-item .value { font-size: 1rem; font-weight: 600; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; }

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 12px; }
  .header h1 { font-size: 1.1rem; }
  .detail-grid { grid-template-columns: repeat(2, 1fr); }
  .toolbar { flex-direction: column; }
  .filter-group { width: 100%; }
}
</style>
</head>
<body>

<div class="header">
  <h1>北冥有鱼军团数据后台</h1>
  <span class="tank-count" id="totalCount"></span>
  <div class="actions">
    <button class="btn btn-primary" onclick="document.getElementById('importFile').click()">📥 导入CSV</button>
    <input type="file" id="importFile" accept=".csv" style="display:none" onchange="handleImport(event)">
    <button class="btn" onclick="exportCSV()">📤 导出CSV</button>
    <button class="btn" onclick="resetAll()">🔄 重置</button>
  </div>
</div>

<div class="container">
  <!-- Search & Quick Filters -->
  <div class="toolbar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索坦克名称、ID..." oninput="onFilterChange()">
    </div>
    <select id="filterNation" onchange="onFilterChange()"><option value="">全部国家</option></select>
    <select id="filterTier" onchange="onFilterChange()"><option value="">全部等级</option></select>
    <select id="filterType" onchange="onFilterChange()"><option value="">全部车型</option></select>
    <select id="filterPremium" onchange="onFilterChange()"><option value="">全部</option></select>
    <span class="toggle-filters" onclick="toggleAdvanced()" id="toggleBtn">▼ 高级筛选</span>
  </div>

  <!-- Advanced Filters -->
  <div class="toolbar" id="advancedFilters" style="display:none">
    <div class="filter-group">
      <label>均伤 <input type="number" class="range-input" id="damageMin" placeholder="最小" onchange="onFilterChange()"> - <input type="number" class="range-input" id="damageMax" placeholder="最大" onchange="onFilterChange()"></label>
      <label>穿深 <input type="number" class="range-input" id="penMin" placeholder="最小" onchange="onFilterChange()"> - <input type="number" class="range-input" id="penMax" placeholder="最大" onchange="onFilterChange()"></label>
      <label>散布 <input type="number" class="range-input" id="dispMin" placeholder="最小" step="0.01" onchange="onFilterChange()"> - <input type="number" class="range-input" id="dispMax" placeholder="最大" step="0.01" onchange="onFilterChange()"></label>
      <label>俯角 <input type="number" class="range-input" id="depMin" placeholder="最小" onchange="onFilterChange()"> - <input type="number" class="range-input" id="depMax" placeholder="最大" onchange="onFilterChange()"></label>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:70px">预览</th>
          <th data-sort="na" onclick="onSort('na')">坦克名称 <span class="sort-arrow" id="sort-na"></span></th>
          <th data-sort="n" onclick="onSort('n')">国家 <span class="sort-arrow" id="sort-n"></span></th>
          <th data-sort="t" onclick="onSort('t')">等级 <span class="sort-arrow" id="sort-t"></span></th>
          <th data-sort="ty" onclick="onSort('ty')">车型 <span class="sort-arrow" id="sort-ty"></span></th>
          <th data-sort="p" onclick="onSort('p')">金币车 <span class="sort-arrow" id="sort-p"></span></th>
          <th data-sort="d" onclick="onSort('d')">均伤 <span class="sort-arrow" id="sort-d"></span></th>
          <th data-sort="pn" onclick="onSort('pn')">穿深 <span class="sort-arrow" id="sort-pn"></span></th>
          <th data-sort="di" onclick="onSort('di')">散布 <span class="sort-arrow" id="sort-di"></span></th>
          <th data-sort="gd" onclick="onSort('gd')">俯角 <span class="sort-arrow" id="sort-gd"></span></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="pagination">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:0.875rem;color:var(--text-secondary)">每页</span>
      <select id="pageSize" onchange="onPageSizeChange()">
      <option value="10" selected>10</option>
        <option value="25">25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
      <span style="font-size:0.875rem;color:var(--text-secondary)">条</span>
    </div>
    <div class="page-btns" id="pageButtons"></div>
    <span style="font-size:0.875rem;color:var(--text-secondary)" id="pageInfo"></span>
  </div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">🔍</div>
    <p>没有找到匹配的坦克数据</p>
    <button class="btn" onclick="resetAll()" style="margin-top:12px">重置所有筛选条件</button>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

// ===== STATE =====
const TIER_ORDER = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI'];
let sortField = 't';
let sortDir = 'desc';
let currentPage = 1;
let pageSize = 10;

// ===== INIT =====
function init() {
  populateFilterOptions();
  onFilterChange();
}

function populateFilterOptions() {
  const nations = [...new Set(ALL_TANKS.map(t => t.n))].sort();
  const tiers = [...new Set(ALL_TANKS.map(t => t.t))].sort((a,b) => TIER_ORDER.indexOf(a) - TIER_ORDER.indexOf(b));
  const types = [...new Set(ALL_TANKS.map(t => t.ty))].sort();
  const premiums = [...new Set(ALL_TANKS.map(t => t.p))].sort();

  const nationMap = { '苏联': '🇷🇺', '美国': '🇺🇸', '德国': '🇩🇪', '中国': '🇨🇳', '法国': '🇫🇷', '英国': '🇬🇧', '瑞典': '🇸🇪', '日本': '🇯🇵', '波兰': '🇵🇱', '捷克': '🇨🇿', '意大利': '🇮🇹' };

  fillSelect('filterNation', nations, v => (nationMap[v]||'') + ' ' + v);
  fillSelect('filterTier', tiers);
  fillSelect('filterType', types);
  fillSelect('filterPremium', premiums, v => v === '是' ? '💰 金币车' : v === '否' ? '普通车' : v);
}

function fillSelect(id, values, formatter) {
  const sel = document.getElementById(id);
  const first = sel.options[0];
  sel.innerHTML = '';
  sel.appendChild(first);
  values.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = formatter ? formatter(v) : v;
    sel.appendChild(opt);
  });
}

// ===== FILTERING =====
function getFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const nation = document.getElementById('filterNation').value;
  const tier = document.getElementById('filterTier').value;
  const type = document.getElementById('filterType').value;
  const premium = document.getElementById('filterPremium').value;
  const dmgMin = parseFloat(document.getElementById('damageMin').value) || 0;
  const dmgMax = parseFloat(document.getElementById('damageMax').value) || Infinity;
  const penMin = parseFloat(document.getElementById('penMin').value) || 0;
  const penMax = parseFloat(document.getElementById('penMax').value) || Infinity;
  const dispMin = parseFloat(document.getElementById('dispMin').value) || 0;
  const dispMax = parseFloat(document.getElementById('dispMax').value) || Infinity;
  const depMin = parseFloat(document.getElementById('depMin').value) || -999;
  const depMax = document.getElementById('depMax').value !== '' ? (parseFloat(document.getElementById('depMax').value) || 0) : Infinity;

  return { search, nation, tier, type, premium, dmgMin, dmgMax, penMin, penMax, dispMin, dispMax, depMin, depMax };
}

function applyFilters(tanks) {
  const f = getFilters();
  return tanks.filter(t => {
    if (f.nation && t.n !== f.nation) return false;
    if (f.tier && t.t !== f.tier) return false;
    if (f.type && t.ty !== f.type) return false;
    if (f.premium && t.p !== f.premium) return false;
    if (t.d < f.dmgMin || t.d > f.dmgMax) return false;
    if (t.pn < f.penMin || t.pn > f.penMax) return false;
    if (t.di < f.dispMin || t.di > f.dispMax) return false;
    if (t.gd < f.depMin || t.gd > f.depMax) return false;
    if (f.search) {
      const idStr = String(t.id);
      if (!t.na.toLowerCase().includes(f.search) && !idStr.includes(f.search)) return false;
    }
    return true;
  });
}

// ===== SORTING =====
function onSort(field) {
  if (sortField === field) {
    sortDir = sortDir === 'asc' ? 'desc' : (sortDir === 'desc' ? 'asc' : 'asc');
  } else {
    sortField = field;
    sortDir = 'asc';
  }
  currentPage = 1;
  render();
}

function applySort(tanks) {
  return [...tanks].sort((a, b) => {
    let va = a[sortField], vb = b[sortField];
    if (sortField === 't') {
      va = TIER_ORDER.indexOf(va);
      vb = TIER_ORDER.indexOf(vb);
    }
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
}

// ===== RENDER =====
function render() {
  let filtered = applyFilters(ALL_TANKS);
  let sorted = applySort(filtered);
  const totalFiltered = sorted.length;

  // Pagination
  const totalPages = Math.ceil(totalFiltered / pageSize);
  if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
  const start = (currentPage - 1) * pageSize;
  const page = sorted.slice(start, start + pageSize);

  // Table body
  const tbody = document.getElementById('tableBody');
  if (page.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
    document.querySelector('.table-wrap').style.display = 'none';
  } else {
    document.getElementById('emptyState').style.display = 'none';
    document.querySelector('.table-wrap').style.display = 'block';
    const nationMap = { '苏联': '🇷🇺', '美国': '🇺🇸', '德国': '🇩🇪', '中国': '🇨🇳', '法国': '🇫🇷', '英国': '🇬🇧', '瑞典': '🇸🇪', '日本': '🇯🇵', '波兰': '🇵🇱', '捷克': '🇨🇿', '意大利': '🇮🇹' };
    tbody.innerHTML = page.map(t => `
      <tr onclick="showDetail('${t.id}')" title="点击查看详情">
        <td><img src="${t.img}" alt="${t.na}" class="thumb-img" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span class="thumb-img-fallback" style="display:none">N/A</span></td>
        <td class="tank-name">${escHtml(t.na)}</td>
        <td>${nationMap[t.n]||''} ${escHtml(t.n)}</td>
        <td><span class="badge badge-tier">${escHtml(t.t)}</span></td>
        <td><span class="badge badge-type-${escHtml(t.ty)}">${escHtml(t.ty)}</span></td>
        <td>${t.p === '是' ? '<span class="badge badge-premium">💰 金币</span>' : escHtml(t.p)}</td>
        <td>${t.d}</td>
        <td>${t.pn}</td>
        <td>${t.di.toFixed(2)}</td>
        <td>${t.gd}°</td>
      </tr>
    `).join('');
  }

  // Sort arrows
  document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '');
  document.querySelectorAll('.sort-arrow').forEach(el => el.classList.remove('active'));
  const arrowEl = document.getElementById('sort-' + sortField);
  if (arrowEl) {
    arrowEl.textContent = sortDir === 'asc' ? ' ▲' : ' ▼';
    arrowEl.classList.add('active');
  }

  // Pagination
  renderPagination(totalFiltered, totalPages);

  // Count
  document.getElementById('totalCount').textContent = `共 ${totalFiltered} 辆坦克`;
}

function renderPagination(totalFiltered, totalPages) {
  const container = document.getElementById('pageButtons');
  if (totalPages <= 1) {
    container.innerHTML = '';
    document.getElementById('pageInfo').textContent = `显示 ${totalFiltered} 条`;
    return;
  }

  let html = '';
  html += `<button class="btn btn-sm" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>◀</button>`;

  const maxBtns = 7;
  let startP = Math.max(1, currentPage - 3);
  let endP = Math.min(totalPages, startP + maxBtns - 1);
  if (endP - startP < maxBtns - 1) startP = Math.max(1, endP - maxBtns + 1);

  if (startP > 1) { html += `<button class="btn btn-sm" onclick="goPage(1)">1</button>`; if (startP > 2) html += `<span style="padding:0 4px">…</span>`; }
  for (let i = startP; i <= endP; i++) {
    html += `<button class="btn btn-sm ${i===currentPage?'btn-primary':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (endP < totalPages) { if (endP < totalPages-1) html += `<span style="padding:0 4px">…</span>`; html += `<button class="btn btn-sm" onclick="goPage(${totalPages})">${totalPages}</button>`; }

  html += `<button class="btn btn-sm" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>▶</button>`;
  container.innerHTML = html;

  const start = (currentPage - 1) * pageSize + 1;
  const end = Math.min(currentPage * pageSize, totalFiltered);
  document.getElementById('pageInfo').textContent = `显示 ${start}-${end} / ${totalFiltered} 条`;
}

function goPage(p) {
  const totalPages = Math.ceil(applyFilters(ALL_TANKS).length / pageSize);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  render();
  document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function onFilterChange() {
  currentPage = 1;
  render();
}

function onPageSizeChange() {
  pageSize = parseInt(document.getElementById('pageSize').value);
  currentPage = 1;
  render();
}

// ===== IMPORT / EXPORT =====
function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const text = e.target.result.replace(/^﻿/, '');
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',');
      const newTanks = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(',');
        if (cols.length < headers.length) continue;
        const tank = {};
        headers.forEach((h, j) => {
          let val = (cols[j] || '').trim();
          const keyMap = {
            'TANK ID': 'id', '国家': 'n', '等级': 't', '坦克名称': 'na',
            '车型': 'ty', '金币车': 'p', '默认炮火均伤': 'd', '默认炮火穿深': 'pn',
            '百米散布': 'di', '俯角（度°）': 'gd', '预览': 'img'
          };
          const key = keyMap[h] || h;
          if (['id', 'd', 'pn', 'gd'].includes(key)) val = parseInt(val, 10) || 0;
          else if (key === 'di') val = parseFloat(val) || 0;
          tank[key] = val;
        });
        newTanks.push(tank);
      }
      ALL_TANKS.length = 0;
      ALL_TANKS.push(...newTanks);
      populateFilterOptions();
      resetAll();
      alert(`成功导入 ${newTanks.length} 辆坦克数据`);
    } catch(err) {
      alert('导入失败：' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function exportCSV() {
  const filtered = applyFilters(ALL_TANKS);
  const sorted = applySort(filtered);
  const keyMapReverse = { id:'TANK ID', n:'国家', t:'等级', na:'坦克名称', ty:'车型', p:'金币车', d:'默认炮火均伤', pn:'默认炮火穿深', di:'百米散布', gd:'俯角（度°）', img:'预览' };
  const headers = ['TANK ID','国家','等级','坦克名称','车型','金币车','默认炮火均伤','默认炮火穿深','百米散布','俯角（度°）','预览'];
  const lines = [headers.join(',')];
  sorted.forEach(t => {
    lines.push(headers.map(h => {
      const key = Object.entries(keyMapReverse).find(([k,v]) => v === h)?.[0] || h;
      const val = t[key] ?? '';
      if (key === 'di') return String(val);
      return String(val);
    }).join(','));
  });
  const csv = '﻿' + lines.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'tanks_export.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function resetAll() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterNation').value = '';
  document.getElementById('filterTier').value = '';
  document.getElementById('filterType').value = '';
  document.getElementById('filterPremium').value = '';
  document.getElementById('damageMin').value = '';
  document.getElementById('damageMax').value = '';
  document.getElementById('penMin').value = '';
  document.getElementById('penMax').value = '';
  document.getElementById('dispMin').value = '';
  document.getElementById('dispMax').value = '';
  document.getElementById('depMin').value = '';
  document.getElementById('depMax').value = '';
  sortField = 't';
  sortDir = 'desc';
  currentPage = 1;
  render();
}

function toggleAdvanced() {
  const panel = document.getElementById('advancedFilters');
  const btn = document.getElementById('toggleBtn');
  if (panel.style.display === 'none') {
    panel.style.display = 'flex';
    btn.textContent = '▲ 收起筛选';
  } else {
    panel.style.display = 'none';
    btn.textContent = '▼ 高级筛选';
  }
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft' && !e.target.closest('input') && !e.target.closest('select')) goPage(currentPage - 1);
  if (e.key === 'ArrowRight' && !e.target.closest('input') && !e.target.closest('select')) goPage(currentPage + 1);
});

init();
</script>
