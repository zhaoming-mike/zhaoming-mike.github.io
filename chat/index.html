<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOT-聊天助手</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --accent: #43a047;
  --accent-dim: rgba(67, 160, 71, 0.18);
  --text: #2c3a2c;
  --text-dim: #8a9a8a;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  background: linear-gradient(180deg, #f0f4f0 0%, #f5f7f5 40%, #e8efe8 100%);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* Header */
.header {
  text-align: center;
  padding: 32px 16px 20px;
}

.header h1 {
  display: inline-block;
  font-size: 24px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 3px;
  text-shadow: none;
  position: relative;
}

.header h1::after {
  content: '';
  display: block;
  width: 60%;
  height: 2px;
  margin: 8px auto 0;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  padding: 0 16px 32px;
  max-width: 760px;
  margin: 0 auto;
}

/* Cards */
.card {
  background: #ffffff;
  border: 1px solid rgba(67, 160, 71, 0.15);
  border-radius: 10px;
  padding: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  transition: border-color 0.3s, box-shadow 0.3s;
}

.card:hover {
  border-color: var(--accent-dim);
  box-shadow: 0 2px 8px rgba(67, 160, 71, 0.1);
}

.card-header {
  position: relative;
  padding: 0 0 12px 12px;
  margin-bottom: 12px;
  border-bottom: 1px solid rgba(67, 160, 71, 0.12);
}

.card-header::before {
  content: '';
  position: absolute;
  left: 0;
  top: 2px;
  bottom: 14px;
  width: 3px;
  background: var(--accent);
  border-radius: 2px;
}

.card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
}

.card-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Buttons */
.copy-btn {
  background: linear-gradient(135deg, #43a047 0%, #388e3c 100%);
  color: #fff;
  border: none;
  border-radius: 5px;
  padding: 7px 15px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
  max-width: 100%;
  box-shadow: 0 2px 6px rgba(67, 160, 71, 0.25);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  white-space: normal;
  word-break: break-all;
  line-height: 1.4;
  max-height: calc(2.8em + 14px);
}

.copy-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(67, 160, 71, 0.35);
}

.copy-btn img {
  width: 20px;
  height: 20px;
  vertical-align: middle;
  margin: 0 1px;
  pointer-events: none;
}

.copy-btn:active {
  transform: scale(0.96);
}

/* Emoticon pick buttons (10 in a row, image only) */
.emoji-row {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
}

.emoji-pick-btn {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px 2px;
  background: #f0f4f0;
  border: 1px solid rgba(67, 160, 71, 0.2);
  border-radius: 5px;
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s, background 0.2s;
}

.emoji-pick-btn:hover {
  border-color: var(--accent);
  background: #e8f5e9;
  box-shadow: 0 0 10px rgba(67, 160, 71, 0.15);
  transform: translateY(-1px);
}

.emoji-pick-btn img {
  width: 26px;
  height: 26px;
  pointer-events: none;
}

/* Composer (multiline text box showing chosen emoticons) */
.composer {
  width: 100%;
  min-height: 52px;
  max-height: 120px;
  overflow-y: auto;
  padding: 10px 12px;
  margin-bottom: 10px;
  background: #f0f4f0;
  border: 1px solid rgba(67, 160, 71, 0.25);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  outline: none;
  word-break: break-all;
  white-space: pre-wrap;
}

.composer:focus {
  border-color: var(--accent);
}

.composer img {
  width: 22px;
  height: 22px;
  vertical-align: middle;
  margin: 0 1px;
  pointer-events: none;
}

.composer:empty::before {
  content: '点击上方表情添加到此处，也可直接输入文字';
  color: var(--text-dim);
  pointer-events: none;
}

/* Copy composer button */
.composer-copy-btn {
  display: block;
  width: 100%;
  padding: 8px;
  background: linear-gradient(135deg, #43a047 0%, #388e3c 100%);
  color: #fff;
  border: none;
  border-radius: 5px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 2px 8px rgba(67, 160, 71, 0.3);
  letter-spacing: 2px;
}

.composer-copy-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(67, 160, 71, 0.4);
}

.composer-copy-btn:active {
  transform: scale(0.97);
}

.composer-actions {
  display: flex;
  gap: 8px;
}

.composer-clear-btn {
  flex: 0 0 auto;
  padding: 8px 16px;
  background: #f0f4f0;
  color: var(--text-dim);
  border: 1px solid rgba(67, 160, 71, 0.25);
  border-radius: 5px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s, color 0.15s, background 0.15s;
  letter-spacing: 1px;
}

.composer-clear-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: #e8f5e9;
  transform: translateY(-1px);
}

.composer-clear-btn:active {
  transform: scale(0.97);
}

.emoji-card {
  grid-column: 1 / -1;
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-120px);
  background: var(--accent);
  color: #fff;
  padding: 10px 28px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  z-index: 1000;
  transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  pointer-events: none;
  max-width: min(90vw, 480px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  box-shadow: 0 6px 24px rgba(0,0,0,0.15);
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}

/* Ripple */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.3);
  transform: scale(0);
  animation: ripple-anim 0.5s ease-out;
  pointer-events: none;
}

@keyframes ripple-anim {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

@media (max-width: 767px) {
  .grid {
    grid-template-columns: 1fr;
    gap: 10px;
    padding: 0 12px 24px;
  }

  .header {
    padding: 24px 12px 16px;
  }

  .header h1 {
    font-size: 20px;
    letter-spacing: 2px;
  }

  .card {
    padding: 14px;
  }

  .copy-btn {
    padding: 10px 16px;
    font-size: 14px;
    max-height: calc(2.8em + 20px);
  }

  .emoji-pick-btn img {
    width: 22px;
    height: 22px;
  }

  .composer img {
    width: 20px;
    height: 20px;
  }
}
</style>
</head>
<body>
<div class="header">
  <h1>WOT-聊天助手</h1>
</div>
<div class="grid" id="grid"></div>
<div class="toast" id="toast">✓ 已复制</div>
<script>
let CATEGORIES = [];
let EMOTICONS = [];

async function loadContent() {
  const grid = document.getElementById('grid');
  try {
    const [res1, res2] = await Promise.all([
      fetch('content.json'),
      fetch('emoticons.json')
    ]);
    if (!res1.ok || !res2.ok) throw new Error('Load failed');
    CATEGORIES = await res1.json();
    EMOTICONS = await res2.json();
    render();
  } catch {
    grid.innerHTML =
      '<p style="text-align:center;color:var(--accent);padding:40px;">加载失败，请刷新重试</p>';
  }
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  }
}

let toastTimer;

function showToast(text) {
  const toast = document.getElementById('toast');
  toast.textContent = `✓ 已复制：${text}`;
  toast.classList.add('show');

  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.classList.remove('show');
  }, 1500);
}

function renderEmoticonText(text) {
  const flat = [];
  EMOTICONS.forEach(em => em.codes.forEach(c => flat.push({ code: c, image: em.image, name: em.name })));
  flat.sort((a, b) => b.code.length - a.code.length);

  let out = '';
  let i = 0;
  while (i < text.length) {
    let matched = false;
    for (const { code, image, name } of flat) {
      if (text.startsWith(code, i)) {
        out += `<img src="${image}" alt="${name}">`;
        i += code.length;
        matched = true;
        break;
      }
    }
    if (!matched) {
      const ch = text[i];
      if (ch === '<') out += '&lt;';
      else if (ch === '>') out += '&gt;';
      else if (ch === '&') out += '&amp;';
      else out += ch;
      i++;
    }
  }
  return out;
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const emojiCard = document.createElement('div');
  emojiCard.className = 'card emoji-card';
  emojiCard.innerHTML = `
    <div class="card-header">
      <span class="card-title">自定义内容</span>
    </div>
    <div class="emoji-row">
      ${EMOTICONS.map((em, i) => `
        <button class="emoji-pick-btn" data-emoticon="${i}" title="${em.name}">
          <img src="${em.image}" alt="${em.name}">
        </button>
      `).join('')}
    </div>
    <div class="composer" id="composer" contenteditable="true"></div>
    <div class="composer-actions">
      <button class="composer-clear-btn" id="composerClearBtn">清空</button>
      <button class="composer-copy-btn" id="composerCopyBtn" style="flex:1">复制到剪贴板</button>
    </div>
  `;
  grid.appendChild(emojiCard);

  CATEGORIES.forEach(cat => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <div class="card-header">
        <span class="card-title">${cat.name}</span>
      </div>
      <div class="card-buttons">
        ${cat.items.map((item, i) => `
          <button class="copy-btn" data-category="${cat.id}" data-index="${i}" title="${item.text.replace(/"/g, '&quot;')}">${renderEmoticonText(item.text)}</button>
        `).join('')}
      </div>
    `;

    grid.appendChild(card);
  });
}

loadContent();

function createRipple(e, btn) {
  const ripple = document.createElement('span');
  ripple.className = 'ripple';

  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  ripple.style.width = ripple.style.height = `${size}px`;
  ripple.style.left = `${e.clientX - rect.left - size / 2}px`;
  ripple.style.top = `${e.clientY - rect.top - size / 2}px`;

  btn.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
}

document.getElementById('grid').addEventListener('click', async (e) => {
  // Clear composer button
  const clearBtn = e.target.closest('.composer-clear-btn');
  if (clearBtn) {
    const composer = document.getElementById('composer');
    composer.innerHTML = '';
    composer.focus();
    return;
  }

  // Emoticon pick button → insert into composer
  const pickBtn = e.target.closest('.emoji-pick-btn');
  if (pickBtn) {
    const idx = parseInt(pickBtn.dataset.emoticon);
    const em = EMOTICONS[idx];
    const composer = document.getElementById('composer');
    const img = document.createElement('img');
    img.src = em.image;
    img.alt = em.name;
    img.setAttribute('data-code', em.codes[0]);
    composer.appendChild(img);

    const range = document.createRange();
    range.setStartAfter(img);
    range.collapse(true);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    composer.focus();
    return;
  }

  // Composer copy button → extract and copy
  const copyBtn = e.target.closest('.composer-copy-btn');
  if (copyBtn) {
    const composer = document.getElementById('composer');
    let result = '';
    composer.childNodes.forEach(node => {
      if (node.nodeType === 3) {
        result += node.textContent;
      } else if (node.tagName === 'IMG') {
        result += node.getAttribute('data-code') || '';
      }
    });
    if (!result.trim()) return;
    const ok = await copyText(result);
    if (ok) {
      showToast(result);
    } else {
      const toast = document.getElementById('toast');
      toast.textContent = '复制失败，请重试';
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
    }
    return;
  }

  // Regular text copy button
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;

  const catId = btn.dataset.category;
  const idx = parseInt(btn.dataset.index);
  const cat = CATEGORIES.find(c => c.id === catId);
  const text = cat.items[idx].text;

  const ok = await copyText(text);
  if (ok) {
    const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (isMobile) {
      createRipple(e, btn);
    } else {
      showToast(text);
    }
  } else {
    const toast = document.getElementById('toast');
    toast.textContent = '复制失败，请重试';
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }
});
</script>
</body>
</html>
